<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideOne - Vinyl Bidding</title>
    <link rel="icon" type="image/png" href="/images/vinylicon.png" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <header>
      <h1>SideOne</h1>
      <p>Your destination for collectible vinyl records and live auctions!</p>
    </header>

    <div class="container">
      <div id="items-list">
        <div th:each="item : ${items}" class="auction-item">
          <div class="item-details">
            <img
              th:src="@{/images/{image}(image=${item.image})}"
              alt="Vinyl Image"
              class="item-image"
            />
            <div class="item-info">
              <h3 th:text="${item.name}">Vinyl Name</h3>
              <p th:text="${item.artist}">Artist</p>
              <p>
                Starting Price: €<span th:text="${item.startingPrice}"
                  >Starting Price</span
                >
              </p>
              <p>
                Current Bid: €<span th:text="${item.currentBid}"
                  >Current Bid</span
                >
              </p>
              <p>Time Left: <span id="timer-${item.id}">Loading...</span></p>
            </div>
          </div>
          <button
            id="bid-btn-${item.id}"
            th:attr="onclick='placeBid(${item.id})'"
          >
            Place Bid
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <footer>
      <p>© 2025 by Jani Hiltunen</p>
      <ul class="socials">
        <li>
          <a href="https://jhiltunenportfolio.netlify.app" target="_blank">
            <img
              src="images/portfolioicon.png"
              alt="Portfolio"
              title="My portfolio page"
              style="margin-top: 5px"
            />
          </a>
        </li>
        <li>
          <a href="https://github.com/JangoHiltzy" target="_blank">
            <img
              src="images/githubicon.png"
              alt="GitHub"
              title="My GitHub profile"
            />
          </a>
        </li>
        <li>
          <a href="https://www.linkedin.com/in/hiltzy/" target="_blank">
            <img
              src="images/linkedinicon.png"
              alt="LinkedIn"
              title="My LinkedIn profile"
            />
          </a>
        </li>
      </ul>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
      // FUNCTION TO SET CURRENT USER
      if (!localStorage.getItem("currentUser")) {
        localStorage.setItem("currentUser", "User");
      }
      const user = localStorage.getItem("currentUser");

      // FUNCTION TO FETCH AND DISPLAY VINYL ITEMS
      function fetchItems() {
        let items = JSON.parse(localStorage.getItem("items")) || [];
        const itemsList = document.getElementById("items-list");
        itemsList.innerHTML = "";

        items.forEach((item) => {
          if (!item.bidEndTime || new Date().getTime() > item.bidEndTime) {
            item.bidEndTime = new Date().getTime() + 50 * 1000;
          }

          const itemDiv = document.createElement("div");
          itemDiv.classList.add("item");

          itemDiv.innerHTML = `
      <div class="item-details">
          <img src="/images/${item.image}" alt="${item.name}" class="album-cover">
          <div class="item-info">
              <h2>${item.name}</h2>
              <p><strong>Artist:</strong> ${item.artist}</p>
              <p><strong>Starting Price:</strong> €${item.startingPrice}</p>
              <p><strong>Current Bid:</strong> €${item.currentBid}</p>
              <p><strong>Time Left:</strong> <span id="timer-${item.id}">Loading...</span></p>
          </div>
      </div>
      <button id="bid-btn-${item.id}" onclick="placeBid(${item.id})">Place Bid</button>
    `;
          itemsList.appendChild(itemDiv);

          startCountdown(item.id, item.bidEndTime);
        });

        localStorage.setItem("items", JSON.stringify(items));
      }

      // FUNCTION TO HANDLE THE COUNTDOWN TIMER
      function startCountdown(itemId, bidEndTime) {
        const timerElement = document.getElementById(`timer-${itemId}`);
        const bidButton = document.getElementById(`bid-btn-${itemId}`);
        let items = JSON.parse(localStorage.getItem("items")) || [];
        let item = items.find((item) => item.id === itemId);

        function updateTimer() {
          const now = new Date().getTime();
          const timeLeft = bidEndTime - now;

          if (timeLeft <= 0) {
            timerElement.textContent = "Bidding Ended";
            bidButton.disabled = true;
            bidButton.style.opacity = "0.5";

            if (item && item.highestBidder === user) {
              let wonItems = JSON.parse(localStorage.getItem("wonItems")) || [];

              if (!wonItems.some((wonItem) => wonItem.id === item.id)) {
                wonItems.push(item);
                localStorage.setItem("wonItems", JSON.stringify(wonItems));
              }

              finalizeAuction();
              resetBidsAfterAuction();
            }

            return;
          }

          const minutes = Math.floor(timeLeft / 60000);
          const seconds = Math.floor((timeLeft % 60000) / 1000);
          timerElement.textContent = `${minutes}m ${seconds}s`;

          setTimeout(updateTimer, 1000);
        }

        updateTimer();
      }

      // FUNCTION TO HANDLE USER PLACING A BID
      function placeBid(itemId) {
        const bidInputToast = document.createElement("div");
        bidInputToast.classList.add("bid-toast");
        bidInputToast.innerHTML = `
        <p>Enter your bid amount:</p>
        <input type="number" id="bidAmountInput" min="1" step="0.01">
        <button id="confirmBidBtn">Place Bid</button>
        <button id="cancelBidBtn">Cancel</button>
    `;

        document.body.appendChild(bidInputToast);

        document.getElementById("confirmBidBtn").onclick = function () {
          const bidAmount = parseFloat(
            document.getElementById("bidAmountInput").value
          );
          if (!isNaN(bidAmount)) {
            let items = JSON.parse(localStorage.getItem("items")) || [];
            const item = items.find((item) => item.id === itemId);
            const user = localStorage.getItem("currentUser");

            if (item && new Date().getTime() < item.bidEndTime) {
              if (bidAmount > item.currentBid) {
                item.currentBid = bidAmount;
                item.highestBidder = user;
                localStorage.setItem("items", JSON.stringify(items));

                showBidNotification("😊 Bid placed successfully!", "success");
                fetchItems();
                cpuCounterBid(itemId);
              } else {
                showBidNotification(
                  "⚠️ Bid must be higher than the current bid!",
                  "error"
                );
              }
            } else {
              showBidNotification(
                "😔 Bidding for this item has ended!",
                "error"
              );
            }
          } else {
            showBidNotification("⚠️ Please enter a valid bid amount!", "error");
          }

          bidInputToast.remove();
        };

        document.getElementById("cancelBidBtn").onclick = function () {
          bidInputToast.remove();
        };
      }

      // FUNCTION TO HANDLE CPU PLACING A BID
      function cpuBid(itemId) {
        let items = JSON.parse(localStorage.getItem("items")) || [];
        const item = items.find((item) => item.id === itemId);
        const user = localStorage.getItem("currentUser");

        if (!item || new Date().getTime() > item.bidEndTime) return;

        cpuMaxBid(item);

        if (!item.highestBidder || item.highestBidder === "CPU_Bidder") return;

        const userBid = item.currentBid;
        let cpuBidAmount = userBid + Math.floor(Math.random() * 10) + 1;

        if (cpuBidAmount <= item.cpuMaxBid) {
          item.currentBid = cpuBidAmount;
          item.highestBidder = "CPU_Bidder";

          if (item.highestBidder === "CPU_Bidder") {
            let lostItems = JSON.parse(localStorage.getItem("lostItems")) || [];
            if (!lostItems.some((lostItem) => lostItem.id === item.id)) {
              lostItems.push(item);
              localStorage.setItem("lostItems", JSON.stringify(lostItems));
            }
          }

          localStorage.setItem("items", JSON.stringify(items));
          fetchItems();
        }
      }

      // FUNCTION TO SCHEDULE THE CPU COUNTER BID
      function cpuCounterBid(itemId) {
        const randomDelay =
          Math.floor(Math.random() * (25000 - 5000 + 1)) + 5000;

        setTimeout(() => {
          cpuBid(itemId);
        }, randomDelay);
      }

      // FUNCTION TO HANDLE CPU MAX BID
      function cpuMaxBid(item) {
        if (!item.cpuMaxBid) {
          item.cpuMaxBid =
            item.startingPrice + Math.floor(Math.random() * 100) + 50;
        }
      }

      // FUNCTION TO SHOW BID NOTIFICATION
      function showBidNotification(message, type = "info", duration = 3000) {
        const notification = document.createElement("div");
        notification.classList.add("notification", "bid-notification", type);
        notification.textContent = message;

        document.body.appendChild(notification);

        setTimeout(() => {
          notification.classList.add("fade-out");
          setTimeout(() => notification.remove(), 500);
        }, duration);
      }

      // FUNCTION TO SHOW AUCTION END NOTIFICATION
      function showAuctionNotification(
        message,
        type = "success",
        duration = 5000
      ) {
        let containerClass = type === "success" ? "won" : "lost";

        let container = document.querySelector(
          `.auction-notifications.${containerClass}`
        );
        if (!container) {
          container = document.createElement("div");
          container.classList.add("auction-notifications", containerClass);
          document.body.appendChild(container);
        }

        const notification = document.createElement("div");
        notification.classList.add("notification", type);
        notification.textContent = message;

        container.appendChild(notification);

        setTimeout(() => {
          notification.classList.add("fade-out");
          setTimeout(() => notification.remove(), 500);
        }, duration);
      }

      // FUNCTION TO FINALIZE AUCTION
      function finalizeAuction() {
        let items = JSON.parse(localStorage.getItem("items")) || [];
        const user = localStorage.getItem("currentUser");

        let wonItems = [];
        let lostItems = [];

        items.forEach((item) => {
          if (item.bidEndTime && new Date().getTime() > item.bidEndTime) {
            if (item.highestBidder === user) {
              wonItems.push(item);
            } else if (item.highestBidder === "CPU_Bidder") {
              lostItems.push(item);
            }
          }
        });

        localStorage.setItem("wonItems", JSON.stringify(wonItems));
        localStorage.setItem("lostItems", JSON.stringify(lostItems));

        if (wonItems.length > 0) {
          const wonItemNames = wonItems.map((item) => item.name).join(", ");
          showAuctionNotification(
            `😊 You won: ${wonItemNames}!`,
            "success",
            5000
          );
        }

        if (lostItems.length > 0) {
          const lostItemNames = lostItems.map((item) => item.name).join(", ");
          showAuctionNotification(
            `😔 You lost: ${lostItemNames}.`,
            "error",
            5000
          );
        }
      }

      // FUNCTION TO RESET ALL BIDS AFTER AUCTION ENDS
      function resetBidsAfterAuction() {
        let items = JSON.parse(localStorage.getItem("items")) || [];

        items.forEach((item) => {
          if (item.bidEndTime && new Date().getTime() > item.bidEndTime) {
            item.currentBid = item.startingPrice;
            item.highestBidder = null;
            item.cpuMaxBid = null;
          }
        });

        localStorage.setItem("items", JSON.stringify(items));
      }

      // FETCH AND DISPLAY ITEMS WHEN THE PAGE LOADS
      document.addEventListener("DOMContentLoaded", fetchItems);
    </script>
  </body>
</html>
